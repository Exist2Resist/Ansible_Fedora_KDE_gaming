---
- name: Fedora setup
  hosts: localhost
  become: true
  become_user: "{{ lookup('ansible.builtin.env', 'USER') }}"
  become_method: ansible.builtin.sudo
  gather_facts: true
  vars_files:
    - vars/vars.yaml
    - vars/secret_vars.yaml
  tasks:
    - name: Add repositories
      ansible.builtin.include_tasks: tasks/1_repos.yaml

    - name: Machine configuration and certificates
      ansible.builtin.include_tasks: tasks/2_machine_and_certs.yaml

    - name: Operating System tweaks
      ansible.builtin.include_tasks: tasks/3_os_tweaks.yaml

  handlers: 
    - name: Reboot
      ansible.builtin.reboot:
        msg: "Rebooting machine in 5 seconds"

    - name: Update-grub
      become_user: root
      ansible.builtin.shell: grub2-mkconfig -o /boot/grub2/grub.cfg
