---
hostname: "PewPewTer"
cur_hostname: "{{lookup('pipe','hostname')}}"
fedora_ver: "{{ ansible_distribution_major_version }}"
user: "{{ lookup('ansible.builtin.env', 'USER') }}"
os_user: "{{ lookup('ansible.builtin.env', 'USER') }}"
user_home: "{{ lookup('ansible.builtin.env', 'HOME') }}"
mokpwd: "Secret" # Used in MOK enrollment
rnnoise: "stereo" # type of mono or stereo
xboxadapter: "enabled" # enable will install the xbox wireless adapter, any other value will not
starcitizen: "enabled" # installs lug helper for Star Citizen installation
