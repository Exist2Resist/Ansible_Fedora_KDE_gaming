---
- name: Fedora setup
  hosts: localhost
  become: true
  become_user: "{{ lookup('ansible.builtin.env', 'USER') }}"
  become_method: ansible.builtin.sudo
  gather_facts: true
  vars_files:
    - vars/vars.yaml
    - vars/secret_vars.yaml
  tasks:
    - name: Add repositories
      ansible.builtin.include_tasks: tasks/repos.yaml

    - name: Install Packages
      ansible.builtin.include_tasks: tasks/applications.yaml

    - name: Create configurations
      ansible.builtin.include_tasks: tasks/configs.yaml
